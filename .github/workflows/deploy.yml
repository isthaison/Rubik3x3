name: Deploy Rubik Companion to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Support both common default branches

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build integrity & typings
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Deploy static site artifacts
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite outputs compilation assets to
          branch: gh-pages # The target branch for GitHub Pages hosting
          clean: true
