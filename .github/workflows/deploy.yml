name: Deploy Rubik Companion to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Thiết lập các quyền hạn của GITHUB_TOKEN để triển khai lên GitHub Pages trực tiếp
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build integrity & typings
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Setup pages environment
        uses: actions/configure-pages@v4

      - name: Upload compiled pages artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4