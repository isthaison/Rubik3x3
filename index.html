<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubik 3x3 Companion & Solver</title>
    <script>
      (function() {
        // Safe global JSON.parse guard to prevent uncaught "undefined" JSON syntax errors
        const originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
          if (text === undefined || text === null) {
            return undefined;
          }
          if (typeof text === 'string') {
            const trimmed = text.trim();
            if (trimmed === 'undefined' || trimmed === '' || trimmed === 'null' || trimmed === '[object Object]') {
              return undefined;
            }
          }
          return originalParse.call(JSON, text, reviver);
        };

        const isJsonBug = (msg) => {
          if (!msg || typeof msg !== 'string') return false;
          return (
            msg.includes('not valid JSON') ||
            msg.includes('JSON Parse error') ||
            msg.includes('Unexpected identifier "undefined"') ||
            msg.includes('undefined is not valid JSON') ||
            msg.includes('Unexpected token u in JSON')
          );
        };

        // Suppress uncaught global window errors of this type
        window.addEventListener('error', function(event) {
          if (event.message && isJsonBug(event.message)) {
            console.warn('Suppressing uncaught JSON syntax error in browser:', event.message);
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // Suppress unhandled promise rejections of this type
        window.addEventListener('unhandledrejection', function(event) {
          const reasonMsg = event.reason && (event.reason.message || String(event.reason));
          if (reasonMsg && isJsonBug(reasonMsg)) {
            console.warn('Suppressing unhandled JSON promise rejection in browser:', reasonMsg);
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>

  <body>
    <div id="root">
      <style>
        body {
          margin: 0;
          background-color: #0A0C10; /* Match app background */
          color: #f1f5f9;
          font-family: ui-sans-serif, system-ui, sans-serif;
        }
        #startup-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          background-color: #0A0C10;
        }
        .cube-loader {
          width: 48px;
          height: 48px;
          position: relative;
          transform-style: preserve-3d;
          animation: rotateCube 2.5s infinite linear;
          margin-bottom: 24px;
        }
        .cube-loader .face {
          position: absolute;
          width: 48px;
          height: 48px;
          border: 2px solid #3b82f6;
          background: rgba(59, 130, 246, 0.15);
          box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .cube-loader .front  { transform: translateZ(24px); }
        .cube-loader .back   { transform: rotateY(180deg) translateZ(24px); }
        .cube-loader .right  { transform: rotateY(90deg) translateZ(24px); }
        .cube-loader .left   { transform: rotateY(-90deg) translateZ(24px); }
        .cube-loader .top    { transform: rotateX(90deg) translateZ(24px); }
        .cube-loader .bottom { transform: rotateX(-90deg) translateZ(24px); }
        
        @keyframes rotateCube {
          0% { transform: rotateX(-20deg) rotateY(0deg); }
          100% { transform: rotateX(-20deg) rotateY(360deg); }
        }
        
        .loader-text {
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 0.1em;
          color: #3b82f6;
          animation: pulseText 1.5s infinite ease-in-out;
          text-transform: uppercase;
        }
        
        @keyframes pulseText {
          0%, 100% { opacity: 0.4; }
          50% { opacity: 1; }
        }
      </style>
      <div id="startup-loader">
        <div class="cube-loader">
          <div class="face front"></div>
          <div class="face back"></div>
          <div class="face right"></div>
          <div class="face left"></div>
          <div class="face top"></div>
          <div class="face bottom"></div>
        </div>
        <div class="loader-text">Loading System...</div>
      </div>
    </div>
  </body>
</html>
